   name: Daily SwingNSE Refresh

on:
  workflow_dispatch:
  schedule:
    # 14:00 UTC = 7:30 PM IST
    - cron: "0 14 * * 1-5"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run technical + news + macro refresh
        run: |
          python scanner.py --days 120 --mode top500 --with-news --with-macro --news-limit 100

      - name: Commit updated data
        run: |
          git config --global user.name "swingnse-bot"
          git config --global user.email "swingnse-bot@users.noreply.github.com"
          git add data/ exports/ recommendations.csv news_events.csv macro_snapshot.csv sector_snapshot.csv || true
          git commit -m "Daily SwingNSE data refresh" || echo "No changes to commit"
          git push
